controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_velocity_pid_controller:
      type: rmgo_core/WheelVelocityPidController

    omni_wheel_controller:
      type: rmgo_core/OmniWheelController

    chassis_power_controller:
      type: rmgo_core/ChassisPowerController

    chassis_controller:
      type: rmgo_core/ChassisController

    simple_gimbal_controller:
      type: rmgo_core/SimpleGimbalController

    yaw_angle_pid_controller:
      type: rmgo_core/ErrorPidController

    yaw_velocity_pid_controller:
      type: rmgo_core/JointVelocityPidController

    pitch_angle_pid_controller:
      type: rmgo_core/ErrorPidController

    friction_wheel_controller:
      type: rmgo_core/FrictionWheelController

    heat_controller:
      type: rmgo_core/HeatController

    bullet_feeder_controller:
      type: rmgo_core/BulletFeederController17mm

    left_friction_velocity_pid_controller:
      type: rmgo_core/JointVelocityPidController

    right_friction_velocity_pid_controller:
      type: rmgo_core/JointVelocityPidController

    bullet_feeder_velocity_pid_controller:
      type: rmgo_core/JointVelocityPidController

    teleop_remote_controller:
      type: rmgo_core/TeleopRemoteController

chassis_controller:
  ros__parameters:
    target_controller_name: omni_wheel_controller
    yaw_joint_name: yaw_joint
    yaw_state_interface_name: position
    command_source_frame: yaw
    twist_angular: 0.5235987755982988
    follow_velocity_feedforward: 0.0
    status_topic: /chassis/status
    follow_kp: 7.0
    follow_ki: 0.0
    follow_kd: 0.0
    follow_output_min: -16.0
    follow_output_max: 16.0

chassis_power_controller:
  ros__parameters:
    target_controller_name: omni_wheel_controller
    game_robot_status_topic: /referee/game_robot_status
    power_heat_data_topic: /referee/power_heat_data
    status_timeout: 1.0
    safety_power_limit: 45.0
    buffer_threshold: 30.0
    power_gain: 0.5
    max_power_limit: 95.0

omni_wheel_controller:
  ros__parameters:
    target_controller_name: wheel_velocity_pid_controller
    wheel_joints:
      - left_front_wheel_joint
      - left_back_wheel_joint
      - right_back_wheel_joint
      - right_front_wheel_joint
    wheel_state_interface_name: velocity
    wheel_radius: 0.07
    chassis_radius_x: 0.15897
    chassis_radius_y: 0.15897
    max_wheel_velocity: 40.0
    linear_x_kp: 0.0
    linear_x_ki: 0.0
    linear_x_kd: 0.0
    linear_y_kp: 0.0
    linear_y_ki: 0.0
    linear_y_kd: 0.0
    angular_z_kp: 0.0
    angular_z_ki: 0.0
    angular_z_kd: 0.0

wheel_velocity_pid_controller:
  ros__parameters:
    wheel_joints:
      - left_front_wheel_joint
      - left_back_wheel_joint
      - right_back_wheel_joint
      - right_front_wheel_joint
    command_interface_name: effort
    wheel_state_interface_name: velocity
    max_wheel_effort: 20.0
    wheel_velocity_kp: 0.5
    wheel_velocity_ki: 0.0
    wheel_velocity_kd: 0.0
    wheel_velocity_feedforward: 0.0

    vel_coeff: 0.0048
    effort_coeff: 12.0
    power_offset: 0.0

teleop_remote_controller:
  ros__parameters:
    chassis_controller_name: chassis_controller
    gimbal_controller_name: simple_gimbal_controller
    shooter_controller_name: friction_wheel_controller
    bullet_feeder_controller_name: bullet_feeder_controller
    cmd_vel_topic: /cmd_vel
    cmd_gimbal_topic: /cmd_gimbal
    mode_topic: /cmd_chassis_mode
    shooter_mode_topic: /cmd_shooter_mode
    shooter_fire_topic: /cmd_shooter_fire
    status_topic: /remote/status
    command_timeout: 2.0

referee:
  ros__parameters:
    device: /dev/usbReferee
    rx_buffer_size: 1024
    tx_queue_capacity: 64
    online_timeout: 1.0
    profile: omni_infantry
    publish_period: 0.02
    ui_period: 0.01
    transport_watchdog_period: 0.5
    status_topic: /referee/status
    game_status_topic: /referee/game_status
    game_robot_status_topic: /referee/game_robot_status
    power_heat_data_topic: /referee/power_heat_data
    chassis_status_topic: /chassis/status
    gimbal_status_topic: /gimbal/status
    shooter_status_topic: /shooter/status
    remote_status_topic: /remote/status
    target_status_topic: /target/status
    capacitor_status_topic: /capacitor/status

simple_gimbal_controller:
  ros__parameters:
    yaw_joint_name: yaw_joint
    pitch_joint_name: pitch_joint
    yaw_target_controller_name: yaw_angle_pid_controller
    pitch_target_controller_name: pitch_angle_pid_controller
    state_interface_name: position
    pitch_lower_limit: -0.5098
    pitch_upper_limit: 0.2262
    status_topic: /gimbal/status

yaw_angle_pid_controller:
  ros__parameters:
    target_name: yaw_velocity_pid_controller
    target_interface_name: control_velocity
    kp: 15.0
    ki: 0.0
    kd: 0.0
    feedforward: 0.0
    output_min: -10.0
    output_max: 10.0

yaw_velocity_pid_controller:
  ros__parameters:
    joint_name: yaw_joint
    command_interface_name: effort
    state_joint_name: gimbal/yaw
    state_interface_name: velocity_imu
    kp: 40.0
    ki: 0.001
    kd: 0.01
    velocity_feedforward: 0.0
    output_min: -25.0
    output_max: 25.0

pitch_angle_pid_controller:
  ros__parameters:
    target_name: pitch_joint
    target_interface_name: velocity
    kp: 20.0
    ki: 0.0
    kd: 0.1
    feedforward: 0.0
    output_min: -4.0
    output_max: 4.0

friction_wheel_controller:
  ros__parameters:
    left_friction_joint_name: left_friction_joint
    right_friction_joint_name: right_friction_joint
    left_target_controller_name: left_friction_velocity_pid_controller
    right_target_controller_name: right_friction_velocity_pid_controller
    target_heat_controller_name: heat_controller
    target_bullet_feeder_controller_name: bullet_feeder_controller
    friction_state_interface_name: velocity
    left_friction_velocity: 660.0
    right_friction_velocity: 660.0
    friction_soft_start_stop_time: 1.0
    friction_ready_ratio: 0.95
    friction_fault_ratio: 0.5
    friction_fault_time: 0.2
    bullet_drop_integral_threshold: -14.0
    bullet_drop_recovery_threshold: 0.1
    bullet_drop_velocity_margin: 20.0
    status_topic: /shooter/status

heat_controller:
  ros__parameters:
    target_bullet_feeder_controller_name: bullet_feeder_controller
    game_robot_status_topic: /referee/game_robot_status
    status_timeout: 1.0
    safety_shooter_cooling: 40.0
    safety_shooter_heat_limit: 50000.0
    heat_per_shot: 10000.0
    extra_heat_per_shot: 10.0
    reserved_heat: 10000.0

bullet_feeder_controller:
  ros__parameters:
    bullet_feeder_joint_name: bullet_feeder_joint
    target_velocity_pid_controller_name: bullet_feeder_velocity_pid_controller
    feeder_velocity_state_interface_name: velocity
    bullets_per_feeder_turn: 8.0
    shot_frequency: 20.0
    safe_shot_frequency: 10.0
    eject_frequency: 10.0
    eject_time: 0.05
    deep_eject_frequency: 5.0
    deep_eject_time: 0.2
    single_shot_max_stop_delay: 2.0
    feeder_jam_time: 0.5

left_friction_velocity_pid_controller:
  ros__parameters:
    joint_name: left_friction_joint
    command_interface_name: effort
    state_joint_name: ""
    state_interface_name: velocity
    kp: 0.001
    ki: 0.0
    kd: 0.0
    velocity_feedforward: 0.003
    output_min: -2.0
    output_max: 2.0

right_friction_velocity_pid_controller:
  ros__parameters:
    joint_name: right_friction_joint
    command_interface_name: effort
    state_joint_name: ""
    state_interface_name: velocity
    kp: 0.001
    ki: 0.0
    kd: 0.0
    velocity_feedforward: 0.003
    output_min: -2.0
    output_max: 2.0

bullet_feeder_velocity_pid_controller:
  ros__parameters:
    joint_name: bullet_feeder_joint
    command_interface_name: effort
    state_joint_name: ""
    state_interface_name: velocity
    kp: 0.002
    ki: 0.0
    kd: 0.0
    velocity_feedforward: 0.005
    output_min: -4.0
    output_max: 4.0
