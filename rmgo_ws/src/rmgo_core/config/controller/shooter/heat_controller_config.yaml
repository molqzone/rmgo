heat_controller:
  target_bullet_feeder_controller_name:
    type: string
    description: "Bullet feeder controller that receives heat-limited bullet allowance."
    validation:
      not_empty<>: []
  game_robot_status_topic:
    type: string
    description: "Referee game robot status topic mirrored into a realtime buffer."
    validation:
      not_empty<>: []
  status_timeout:
    type: double
    description: "Maximum age in seconds before referee robot status is considered stale."
    validation:
      gt_eq<>: [0.0]
  heat_per_shot:
    type: double
    description: "Local heat added per detected shot."
    validation:
      gt<>: [0.0]
  extra_heat_per_shot:
    type: double
    description: "Additional conservative heat margin added per shot."
    validation:
      gt_eq<>: [0.0]
  reserved_heat:
    type: double
    description: "Heat margin reserved below the referee heat limit."
    validation:
      gt_eq<>: [0.0]
