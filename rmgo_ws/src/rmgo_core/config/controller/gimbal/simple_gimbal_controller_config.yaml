simple_gimbal_controller:
  yaw_joint_name:
    type: string
    description: "Yaw joint controlled by the gimbal controller."
    validation:
      not_empty<>: []
  pitch_joint_name:
    type: string
    description: "Pitch joint controlled by the gimbal controller."
    validation:
      not_empty<>: []
  yaw_target_controller_name:
    type: string
    description: "Downstream controller that receives yaw control angle error."
    validation:
      not_empty<>: []
  pitch_target_controller_name:
    type: string
    description: "Downstream controller that receives pitch control angle error."
    validation:
      not_empty<>: []
  state_interface_name:
    type: string
    description: "State interface used for yaw and pitch joints."
    validation:
      not_empty<>: []
  pitch_lower_limit:
    type: double
    description: "Lower pitch command limit."
  pitch_upper_limit:
    type: double
    description: "Upper pitch command limit."
  status_topic:
    type: string
    description: "Semantic gimbal status topic consumed by non-RT observers such as referee UI."
    validation:
      not_empty<>: []
