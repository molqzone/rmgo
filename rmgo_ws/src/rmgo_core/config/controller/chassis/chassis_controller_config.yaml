chassis_controller:
  target_controller_name:
    type: string
    description: "Downstream chain controller that receives chassis velocity commands."
    validation:
      not_empty<>: []
  yaw_joint_name:
    type: string
    description: "Joint used as the gimbal yaw angle source."
    validation:
      not_empty<>: []
  yaw_state_interface_name:
    type: string
    description: "State interface used to read yaw_joint_name."
    validation:
      not_empty<>: []
  command_source_frame:
    type: string
    description: "Frame of the incoming remote translational command."
    validation:
      one_of<>: [["yaw", "base_link"]]
  twist_angular:
    type: double
    description: "Maximum twist-mode angular yaw offset."
  follow_velocity_feedforward:
    type: double
    description: "Additional angular velocity feedforward in follow mode."
  status_topic:
    type: string
    description: "Semantic chassis status topic consumed by non-RT observers such as referee UI."
    validation:
      not_empty<>: []
  follow_kp:
    type: double
    description: "Follow-mode proportional gain."
  follow_ki:
    type: double
    description: "Follow-mode integral gain."
  follow_kd:
    type: double
    description: "Follow-mode derivative gain."
  follow_output_min:
    type: double
    description: "Minimum follow-mode control output."
  follow_output_max:
    type: double
    description: "Maximum follow-mode control output."
