chassis_power_controller:
  target_controller_name:
    type: string
    description: "Downstream omni controller that consumes the power_limit reference."
    validation:
      not_empty<>: []
  game_robot_status_topic:
    type: string
    description: "Referee game robot status topic mirrored into a realtime buffer."
    validation:
      not_empty<>: []
  power_heat_data_topic:
    type: string
    description: "Referee power heat topic mirrored into a realtime buffer."
    validation:
      not_empty<>: []
  status_timeout:
    type: double
    description: "Maximum age in seconds before referee packet data is considered stale."
    validation:
      gt_eq<>: [0.0]
  safety_power_limit:
    type: double
    description: "Fallback chassis power limit used when referee robot status is stale or unavailable."
    validation:
      gt_eq<>: [0.0]
  buffer_threshold:
    type: double
    description: "Referee buffer threshold above which rm_control-style extra power is allowed."
    validation:
      gt_eq<>: [0.0]
  power_gain:
    type: double
    description: "Additional power per joule of referee buffer energy above buffer_threshold."
    validation:
      gt_eq<>: [0.0]
  max_power_limit:
    type: double
    description: "Upper bound for the computed chassis control power limit."
    validation:
      gt_eq<>: [0.0]
