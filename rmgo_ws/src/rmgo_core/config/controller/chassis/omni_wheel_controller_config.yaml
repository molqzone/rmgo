omni_wheel_controller:
  wheel_joints:
    type: string_array
    description: "Wheel joints ordered as left-front, left-back, right-back, right-front."
    validation:
      fixed_size<>: 4
  command_interface_name:
    type: string
    description: "Wheel command interface."
    validation:
      not_empty<>: []
  wheel_state_interface_name:
    type: string
    description: "Wheel state interface used for chassis velocity feedback."
    validation:
      not_empty<>: []
  wheel_radius:
    type: double
    description: "Wheel radius in meters."
    validation:
      gt<>: [0.0]
  chassis_radius_x:
    type: double
    description: "Base-link x lever arm used by omni-wheel kinematics."
    validation:
      gt_eq<>: [0.0]
  chassis_radius_y:
    type: double
    description: "Base-link y lever arm used by omni-wheel kinematics."
    validation:
      gt_eq<>: [0.0]
  max_wheel_velocity:
    type: double
    description: "Maximum absolute wheel velocity command. Non-positive disables saturation."
  full_speed_power_limit:
    type: double
    description: "Power limit at which wheel commands are fully available."
    validation:
      gt<>: [0.0]
