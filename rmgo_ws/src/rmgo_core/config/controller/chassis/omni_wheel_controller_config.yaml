omni_wheel_controller:
  target_controller_name:
    type: string
    description: "Wheel velocity PID controller receiving wheel velocity references."
    validation:
      not_empty<>: []
  wheel_joints:
    type: string_array
    description: "Wheel joints ordered as left-front, left-back, right-back, right-front."
    validation:
      fixed_size<>: 4
  wheel_state_interface_name:
    type: string
    description: "Wheel state interface used for chassis velocity feedback."
    validation:
      not_empty<>: []
  wheel_radius:
    type: double
    description: "Wheel radius in meters."
    validation:
      gt<>: [0.0]
  chassis_radius_x:
    type: double
    description: "Base-link x lever arm used by omni-wheel kinematics."
    validation:
      gt_eq<>: [0.0]
  chassis_radius_y:
    type: double
    description: "Base-link y lever arm used by omni-wheel kinematics."
    validation:
      gt_eq<>: [0.0]
  max_wheel_velocity:
    type: double
    description: "Maximum absolute wheel velocity command. Non-positive disables saturation."
  linear_x_kp:
    type: double
    description: "Base-link x velocity proportional gain."
  linear_x_ki:
    type: double
    description: "Base-link x velocity integral gain."
  linear_x_kd:
    type: double
    description: "Base-link x velocity derivative gain."
  linear_y_kp:
    type: double
    description: "Base-link y velocity proportional gain."
  linear_y_ki:
    type: double
    description: "Base-link y velocity integral gain."
  linear_y_kd:
    type: double
    description: "Base-link y velocity derivative gain."
  angular_z_kp:
    type: double
    description: "Base-link angular z velocity proportional gain."
  angular_z_ki:
    type: double
    description: "Base-link angular z velocity integral gain."
  angular_z_kd:
    type: double
    description: "Base-link angular z velocity derivative gain."
