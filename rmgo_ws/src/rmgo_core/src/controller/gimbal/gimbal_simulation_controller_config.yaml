gimbal_simulation_controller:
  yaw_joint_name:
    type: string
    default_value: "yaw_joint"
    description: "Yaw joint controlled by the Gazebo gimbal simulation adapter."
    validation:
      not_empty<>: []
  pitch_joint_name:
    type: string
    default_value: "pitch_joint"
    description: "Pitch joint controlled by the Gazebo gimbal simulation adapter."
    validation:
      not_empty<>: []
  command_interface_name:
    type: string
    default_value: "position"
    description: "Command interface used for yaw and pitch joints."
    validation:
      not_empty<>: []
  state_interface_name:
    type: string
    default_value: "position"
    description: "State interface used for yaw and pitch joints."
    validation:
      not_empty<>: []
  base_odometry_topic:
    type: string
    default_value: "/model/omni_infantry_gz/odometry"
    description: "Gazebo model odometry topic used only for simulation yaw compensation."
    validation:
      not_empty<>: []
  base_odometry_timeout:
    type: double
    default_value: 0.5
    description: "Seconds before base odometry input is considered stale. Non-positive disables timeout."
  pitch_lower_limit:
    type: double
    default_value: -0.5098
    description: "Lower pitch command limit."
  pitch_upper_limit:
    type: double
    default_value: 0.2262
    description: "Upper pitch command limit."
