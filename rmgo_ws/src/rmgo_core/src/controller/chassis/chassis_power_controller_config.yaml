chassis_power_controller:
  target_controller_name:
    type: string
    description: "Downstream chain controller that receives power-limited chassis velocity commands."
    validation:
      not_empty<>: []
  safety_power:
    type: double
    description: "Fallback chassis power limit in watts when referee state is unavailable."
    validation:
      gt_eq<>: [0.0]
  buffer_threshold:
    type: double
    description: "Referee buffer threshold above which rm_control-style extra power is allowed."
    validation:
      gt_eq<>: [0.0]
  power_gain:
    type: double
    description: "Additional power per joule of referee buffer energy above buffer_threshold."
    validation:
      gt_eq<>: [0.0]
  max_power_limit:
    type: double
    description: "Upper bound for the computed chassis control power limit."
    validation:
      gt_eq<>: [0.0]
  full_speed_power_limit:
    type: double
    description: "Power limit at which chassis velocity limits are fully available."
    validation:
      gt<>: [0.0]
  max_linear_x_velocity:
    type: double
    description: "Maximum absolute base-link x velocity when full power is available."
    validation:
      gt_eq<>: [0.0]
  max_linear_y_velocity:
    type: double
    description: "Maximum absolute base-link y velocity when full power is available."
    validation:
      gt_eq<>: [0.0]
  max_angular_z_velocity:
    type: double
    description: "Maximum absolute base-link yaw velocity when full power is available."
    validation:
      gt_eq<>: [0.0]
